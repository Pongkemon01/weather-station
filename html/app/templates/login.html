{% extends "base.html" %}
{% block title %}Login — IoT Admin{% endblock %}
{% block content %}
<div style="max-width:360px;margin:5rem auto">
  <div class="card">
    <h1 style="margin-bottom:1.25rem;text-align:center">IoT Admin</h1>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login.html">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;padding:.45rem">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
