# /etc/nginx/conf.d/iot_server.conf
#
# Deploy: symlink or copy to /etc/nginx/conf.d/ on the production host.
# conf.d/ files are included inside the http{} block of nginx.conf, so
# limit_req_zone is valid here (outside any server{} block).
# Placing it inside a server{} block causes: "zero size shared memory zone".
#
limit_req_zone $arg_id zone=device_api:10m rate=10r/s;

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Device listener — mTLS with the private CA.
# All device traffic lives under /api/v1/weather/ (Q-S1 Option B):
#   ingest, OTA metadata poll, OTA chunk download.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;                             # nginx ≥1.25.1: separate directive, not a listen param
    server_name robin-gpu.cpe.ku.ac.th;

    # Server certificate signed by the private intermediate CA and trusted by
    # the A7670E modem via the CA cert injected at commissioning (Arch §2.3).
    ssl_certificate     /etc/ssl/certs/robin-gpu.cpe.ku.ac.th.crt;
    ssl_certificate_key /etc/ssl/private/robin-gpu.cpe.ku.ac.th.key;

    # Private CA chain for device client-cert validation.
    # Replace {html_dir} with the absolute path to the html/ deployment directory.
    ssl_client_certificate {html_dir}/pki/private_ca_chain.pem;
    ssl_crl                {html_dir}/pki/ca.crl;  # refreshed weekly by scripts/refresh_crl.sh
    ssl_verify_client      on;                     # mandatory — no admin path on this vhost
    ssl_verify_depth       2;

    ssl_protocols             TLSv1.3 TLSv1.2;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Single mTLS-enforced location covering ingest + OTA (Q-S1 Option B):
    #   POST /api/v1/weather/upload                  — sensor ingest
    #   GET  /api/v1/weather/?id=<rrrsss>            — OTA metadata poll
    #   GET  /api/v1/weather/get_firmware?...&id=... — OTA chunk download
    location /api/v1/weather/ {
        if ($ssl_client_verify != SUCCESS) { return 403; }
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_pass         http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        limit_req          zone=device_api burst=20;  # per-$arg_id throttle, see Q-S3
    }

    # Firmware binaries served only via the /get_firmware handler above.
    location /firmware/ { deny all; return 404; }

    # All other paths on the device vhost are closed.
    location / { return 404; }
}

# ---------------------------------------------------------------------------
# Admin listener — public CA (Let's Encrypt), no client cert.
# Human operators via browser only.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;                             # nginx ≥1.25.1: separate directive, not a listen param
    server_name adm.robinlab.cc;

    ssl_certificate     /etc/letsencrypt/live/adm.robinlab.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adm.robinlab.cc/privkey.pem;

    ssl_verify_client         off;        # admin browsers carry no client cert
    ssl_protocols             TLSv1.3 TLSv1.2;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /admin/ {
        proxy_pass         http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    location / { return 404; }
}
