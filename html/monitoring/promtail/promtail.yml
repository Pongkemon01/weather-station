server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://127.0.0.1:3100/loki/api/v1/push

scrape_configs:
  - job_name: iot_server_app
    static_configs:
      - targets: ["localhost"]
        labels:
          job: iot_server
          __path__: /home/akp/html/logs/app.log
    pipeline_stages:
      - json:
          expressions:
            level: levelname
            logger: name
            message: message
            timestamp: asctime
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.999999"
