apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://127.0.0.1:3100

  - name: PostgreSQL
    type: postgres
    uid: postgres
    url: /var/run/postgresql
    database: weather
    user: akp
    jsonData:
      sslmode: disable
      postgresVersion: 1700
      timescaledb: true
